version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: tasknest-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: tasknest
    volumes:
      - mongodb_data:/data/db
    networks:
      - tasknest-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tasknest-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/tasknest?authSource=admin
      JWT_SECRET: your-secret-key-dev
      JWT_EXPIRE: 7d
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
    networks:
      - tasknest-network
    command: npm run dev --workspace=backend

  # Frontend (optional - usually run separately for faster development)
  # Uncomment if you want to run it in Docker
  # frontend:
  #   image: node:18-alpine
  #   container_name: tasknest-frontend
  #   working_dir: /app
  #   ports:
  #     - '5173:5173'
  #   volumes:
  #     - ./frontend:/app
  #   networks:
  #     - tasknest-network
  #   command: npm run dev
  #   environment:
  #     VITE_API_URL: http://localhost:5000/api

volumes:
  mongodb_data:

networks:
  tasknest-network:
    driver: bridge
